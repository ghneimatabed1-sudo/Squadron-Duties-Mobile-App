name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/ios-unsigned-ipa.yml'

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.1+
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund

      - name: Prebuild iOS native project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned archive
        run: |
          set -o pipefail
          cd ios
          n=$(ls -1 *.xcworkspace 2>/dev/null | wc -l | tr -d ' ')
          if [ "$n" != "1" ]; then echo "Expected exactly one .xcworkspace, found $n"; ls -la; exit 1; fi
          APP_NAME=$(basename *.xcworkspace .xcworkspace)
          echo "Using scheme/app: $APP_NAME"
          xcodebuild \
            -workspace "$APP_NAME.xcworkspace" \
            -scheme "$APP_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/$APP_NAME.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" | xcpretty
          test -d "$PWD/build/$APP_NAME.xcarchive" || { echo "Archive folder missing"; exit 1; }

      - name: Package unsigned IPA
        run: |
          set -o pipefail
          cd ios
          APP_NAME=$(basename *.xcworkspace .xcworkspace)
          cd build
          rm -rf Payload && mkdir -p Payload
          cp -R "$APP_NAME.xcarchive/Products/Applications/"*.app Payload/
          zip -qr "SquadronDutyScheduler-unsigned.ipa" Payload
          ls -lh *.ipa

      - name: Upload IPA as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SquadronDutyScheduler-unsigned-ipa
          path: ios/build/SquadronDutyScheduler-unsigned.ipa
          if-no-files-found: error

      - name: Publish IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v1.0.0
          name: Squadron Duty Scheduler - iOS (unsigned IPA)
          body: |
            Unsigned iOS IPA built on a macOS GitHub Actions runner (no Apple Developer account required to build).

            How to install on your iPhone:
            1. Download SquadronDutyScheduler-unsigned.ipa below.
            2. Sign and install it with an on-device / sideload tool (AltStore, Sideloadly, or ESign) using your own Apple ID.

            Note: with a FREE Apple ID, sideloaded apps stay signed for ~7 days, then must be re-installed/re-signed when the signature expires. A paid Apple Developer account extends this to ~1 year.
          files: ios/build/SquadronDutyScheduler-unsigned.ipa
