name: Build unsigned iOS IPA

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/ios-unsigned-ipa.yml'

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.1+
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund

      - name: Prebuild iOS native project
        run: npx expo prebuild --platform ios --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build unsigned archive
        run: |
          cd ios
          APP_NAME=$(basename *.xcworkspace .xcworkspace)
          echo "Using scheme/app: $APP_NAME"
          xcodebuild \
            -workspace "$APP_NAME.xcworkspace" \
            -scheme "$APP_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$PWD/build/$APP_NAME.xcarchive" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" | xcpretty || true
          test -d "$PWD/build/$APP_NAME.xcarchive" || { echo "Archive failed"; exit 1; }

      - name: Package unsigned IPA
        run: |
          cd ios
          APP_NAME=$(basename *.xcworkspace .xcworkspace)
          cd build
          rm -rf Payload && mkdir -p Payload
          cp -R "$APP_NAME.xcarchive/Products/Applications/"*.app Payload/
          zip -qr "SquadronDutyScheduler-unsigned.ipa" Payload
          ls -lh *.ipa

      - name: Upload IPA as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SquadronDutyScheduler-unsigned-ipa
          path: ios/build/SquadronDutyScheduler-unsigned.ipa
          if-no-files-found: error

      - name: Publish IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v1.0.0
          name: Squadron Duty Scheduler - iOS (unsigned IPA)
          body: |
            Unsigned iOS IPA built on a macOS GitHub Actions runner.
            Install it on your iPhone with your signing app (AltStore, Sideloadly, ESign, etc.) - it will re-sign with your Apple ID.
          files: ios/build/SquadronDutyScheduler-unsigned.ipa
