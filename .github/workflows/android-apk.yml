name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/android-apk.yml'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install JS dependencies
        run: npm install --no-audit --no-fund

      - name: Prebuild Android native project
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        run: |
          set -o pipefail
          cd android
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n1)
          test -n "$APK" || { echo "No APK found"; exit 1; }
          cp "$APK" SquadronDutyScheduler.apk
          ls -lh SquadronDutyScheduler.apk
          echo "path=SquadronDutyScheduler.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: SquadronDutyScheduler-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Squadron Duty Scheduler v1.0.0
          body: |
            Android APK built on a GitHub Actions runner (release variant, debug-signed).
            Download SquadronDutyScheduler.apk and install it on your Android device
            (enable "Install unknown apps" for your browser/file manager first).
          files: ${{ steps.apk.outputs.path }}
